# MySQL Database Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate / JPA configuration
# Update schema based on entity configurations
spring.jpa.hibernate.ddl-auto=update
# Show SQL output to console for easier debugging (great for beginners)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Application Port Settings
server.port=8080
